services:
  postgres:
    image: postgres:16
    container_name: hackathon-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: hackathon
      POSTGRES_PASSWORD: hackathon
      POSTGRES_DB: hackathon_analytics
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d   # runs 001_init.sql on first boot only

volumes:
  pg_data:
